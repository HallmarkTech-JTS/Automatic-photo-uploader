<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="app-manifest.json">
    <meta name="theme-color" content="#1e3a8a">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HUID Camera Engine</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f3f4f6; --text: #1f2937; --success: #10b981; --danger: #ef4444; --warning: #f59e0b;}
        body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: var(--text); }
        .container { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 420px; margin: 0 auto; text-align: center; }
        h2 { color: var(--primary); margin-top: 0; font-size: 20px; }
        #connectScreen, #modeScreen, #cameraScreen { display: none; }
        #connectScreen { display: block; } 
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #bfdbfe; border-radius: 8px; font-size: 16px; text-align: center; font-weight: bold; box-sizing: border-box; }
        .btn { color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px; box-sizing: border-box; display: flex; align-items: center; justify-content: center; gap: 8px;}
        .btn-primary { background: var(--primary); }
        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); }
        .btn-warning { background: var(--warning); color: black;}
        
        /* Device Toggle UI */
        .device-toggle { background: #e0e7ff; padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #a5b4fc; display: flex; justify-content: space-around; align-items: center; font-size: 14px; font-weight: bold;}
        .toggle-btn { background: #fff; border: 2px solid #cbd5e1; padding: 8px 12px; border-radius: 6px; cursor: pointer; color: #64748b;}
        .toggle-btn.active { background: #3b82f6; color: white; border-color: #2563eb;}

        .mode-box { border: 2px dashed #9ca3af; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .sync-info { font-size: 13px; color: var(--success); font-weight: bold; margin-bottom: 15px; }
        .header-bar { display: flex; justify-content: space-between; background: #1e3a8a; color: white; padding: 8px 12px; border-radius: 6px; font-size: 14px; font-weight: bold; margin-bottom: 10px;}
        .tag-info { background: #eff6ff; padding: 12px; border-radius: 6px; font-weight: bold; margin-bottom: 10px; color: #1e40af; border: 1px solid #bfdbfe; font-size: 18px;}
        .sub-info { font-size: 12px; color: #6b7280; display: block; margin-top: 4px; }
        
        #previewImage { width: 100%; height: 350px; object-fit: contain; border-radius: 8px; background: #f3f4f6; margin-bottom: 15px; border: 2px solid #e5e7eb; display: none;}
        #videoElement { width: 100%; max-height: 350px; object-fit: cover; border-radius: 8px; background: #000; margin-bottom: 15px; display: none; border: 2px solid #e5e7eb;}
        
        .action-row { display: flex; gap: 10px; }
        .action-row .btn { margin-bottom: 0; }
        #statusMsg { font-size: 14px; margin-top: 10px; font-weight: bold; color: #4b5563; }
        #nativeCameraInput { display: none; }
        .placeholder-box { width: 100%; height: 200px; border: 2px dashed #d1d5db; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #9ca3af; font-weight: bold; margin-bottom: 15px; font-size: 14px;}
    </style>
</head>
<body>

<div class="container">
    <h2>📸 HUID Camera Engine</h2>

    <div id="connectScreen">
        <p style="font-size: 14px; color: #6b7280;">PC Dashboard par likha ID yahan dalein:</p>
        <input type="text" id="pcIdInput" placeholder="Enter PC ID">
        <button class="btn btn-primary" onclick="connectToPC()">🔗 Connect</button>
        <div id="statusMsg">Waiting to connect...</div>
    </div>

    <div id="modeScreen">
        <div class="sync-info">✅ Connected (<span id="totalTagsCount">0</span> Tags Pending)</div>
        
        <div class="device-toggle">
            <div id="btnNative" class="toggle-btn active" onclick="setCameraMode('native')">📱 Mobile App</div>
            <div id="btnLive" class="toggle-btn" onclick="setCameraMode('live')">💻 PC / USB Lens</div>
        </div>

        <div class="mode-box">
            <p style="margin-top: 0; font-weight: bold;">Select Capture Mode:</p>
            <button class="btn btn-primary" onclick="startWorkflow('ARTICLE')">📸 1. Article Photos</button>
            <button class="btn btn-warning" onclick="startWorkflow('HUID')">🔍 2. HUID Photos</button>
        </div>
        <button class="btn btn-danger" onclick="disconnect()">❌ Disconnect</button>
    </div>

    <div id="cameraScreen">
        <div class="header-bar">
            <span id="modeDisplay">ARTICLE</span>
            <span id="progressDisplay">1 / 50</span>
        </div>
        <div class="tag-info">
            Tag: <span id="currentTag" style="color: #ef4444; font-size: 22px;">JHUMKI1</span>
            <span class="sub-info">Job Card: <span id="currentJob">126574672</span></span>
        </div>
        
        <input type="file" id="nativeCameraInput" accept="image/*" capture="environment">
        
        <video id="videoElement" autoplay playsinline></video>
        
        <div id="placeholderBox" class="placeholder-box">Ready for Capture</div>
        <img id="previewImage" src="">
        
        <div id="captureControls">
            <button id="btnTriggerNative" class="btn btn-success" style="font-size: 20px; padding: 20px;" onclick="document.getElementById('nativeCameraInput').click()">📸 Open Mobile Camera</button>
            
            <button id="btnTriggerLive" class="btn btn-success" style="display:none; font-size: 20px; padding: 20px;" onclick="captureLiveFrame()">📸 Capture Frame</button>
            <button id="btnSwitchLens" class="btn btn-info" style="display:none;" onclick="switchLiveCamera()">🔄 Switch USB Lens</button>
        </div>
        
        <div id="actionControls" class="action-row" style="display: none;">
            <button class="btn btn-danger" onclick="triggerRetake()">🔄 Retake</button>
            <button class="btn btn-primary" onclick="nextTag()">⏭️ Next Tag</button>
        </div>
        
        <button class="btn" style="background: #9ca3af; margin-top: 15px;" onclick="goBackToMode()">🔙 Back to Menu</button>
    </div>
</div>

<script>
    let peer = null; let conn = null;
    let tagsList = []; let currentIndex = 0;
    let currentPhotoMode = 'ARTICLE'; 
    let engineMode = 'native'; // 'native' for mobile app, 'live' for PC/USB web stream

    // Live Stream Variables
    let currentStream = null;
    let videoDevices = [];
    let currentDeviceIndex = 0;

    window.onload = function() {
        let savedId = localStorage.getItem('last_pc_id');
        if(savedId) document.getElementById('pcIdInput').value = savedId;
    }

    // Galti se page refresh ya back hone par warning dena
    window.addEventListener('beforeunload', function (e) {
        // Warning sirf tab do jab PC se connection chal raha ho
        if (conn && conn.open) {
            e.preventDefault();
            e.returnValue = ''; // Yeh browser ka default warning popup dikhayega
        }
    });

    // Toggle Engine Type
    function setCameraMode(mode) {
        engineMode = mode;
        document.getElementById('btnNative').classList.remove('active');
        document.getElementById('btnLive').classList.remove('active');
        
        if (mode === 'native') {
            document.getElementById('btnNative').classList.add('active');
        } else {
            document.getElementById('btnLive').classList.add('active');
            loadCameraDevices(); // Pre-load PC cameras
        }
    }

    function connectToPC() {
        const pcId = document.getElementById('pcIdInput').value.trim().toUpperCase();
        if(!pcId) return alert("Please enter ID!");
        localStorage.setItem('last_pc_id', pcId);
        
        document.getElementById('statusMsg').innerText = "⏳ Connecting...";
        peer = new Peer(); 

        peer.on('open', (id) => {
            conn = peer.connect(pcId);
            conn.on('open', () => { document.getElementById('statusMsg').innerText = "✅ Connected!"; });

            conn.on('data', (data) => {
                if(data.type === 'SYNC_LIST') {
                    tagsList = data.items;
                    document.getElementById('totalTagsCount').innerText = tagsList.length;
                    showScreen('modeScreen');
                } 
                else if (data.type === 'RETAKE_PHOTO') {
                    // 🚀 FIX: Duplicate IDs se bachne ke liye Job ID aur Tag ID dono check ho rahe hain
                    let targetIdx = tagsList.findIndex(t => t.tagId === data.tagId && t.jobId === data.jobId);
                    
                    if(targetIdx !== -1) {
                        currentIndex = targetIdx;
                        currentPhotoMode = data.photoType;
                        
                        showScreen('cameraScreen');
                        updateUIForCurrentTag();
                        
                        // Alert user if in Mobile Native mode, otherwise Live Camera opens automatically
                        if (engineMode === 'native') {
                            alert(`🔄 RETAKE COMMAND!\nJob: ${data.jobId}\nTag: ${data.tagId}\nMode: ${data.photoType}\nKripya 'Open Mobile Camera' button dabayein.`);
                        }
                    }
                }
            });
        });
    }

    function startWorkflow(mode) {
        if(tagsList.length === 0) return alert("List khali hai!");
        currentPhotoMode = mode;
        currentIndex = 0; 
        showScreen('cameraScreen');
        updateUIForCurrentTag();
    }

    function updateUIForCurrentTag() {
        if (currentIndex >= tagsList.length) {
            alert(`🎉 ${currentPhotoMode} mode complete!`);
            goBackToMode(); return;
        }

        let item = tagsList[currentIndex];
        document.getElementById('modeDisplay').innerText = currentPhotoMode;
        document.getElementById('progressDisplay').innerText = `${currentIndex + 1} / ${tagsList.length}`;
        document.getElementById('currentTag').innerText = item.tagId;
        document.getElementById('currentJob').innerText = item.jobId;
        
        resetUI();

        if (engineMode === 'live') {
            startLiveStream();
        } else {
            document.getElementById('btnTriggerNative').style.display = 'block';
            document.getElementById('placeholderBox').style.display = 'flex';
        }
    }

    function resetUI() {
        document.getElementById('previewImage').style.display = 'none';
        document.getElementById('videoElement').style.display = 'none';
        document.getElementById('placeholderBox').style.display = 'none';
        
        document.getElementById('captureControls').style.display = 'block';
        document.getElementById('actionControls').style.display = 'none';
        
        document.getElementById('btnTriggerNative').style.display = 'none';
        document.getElementById('btnTriggerLive').style.display = 'none';
        document.getElementById('btnSwitchLens').style.display = 'none';
        document.getElementById('nativeCameraInput').value = "";
    }

    // =====================================
    // NATIVE CAMERA LOGIC (Mobile Focus)
    // =====================================
    document.getElementById('nativeCameraInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                let w = img.width, h = img.height;
                if (w > 1920) { h *= 1920/w; w = 1920; }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                // Compressed Base64 Image
                let b64 = canvas.toDataURL('image/jpeg', 0.90); 
                
                showPreviewAndSend(b64);
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    // =====================================
    // LIVE CAMERA LOGIC (PC / USB Lens Focus)
    // =====================================
    async function loadCameraDevices() {
        try {
            const devices = await navigator.mediaDevices.enumerateDevices();
            videoDevices = devices.filter(d => d.kind === 'videoinput');
        } catch (err) {}
    }

    async function startLiveStream() {
        if (currentStream) { currentStream.getTracks().forEach(t => t.stop()); }
        
        let constraints = { video: { facingMode: "environment" } };
        if (videoDevices.length > 0) { constraints = { video: { deviceId: { exact: videoDevices[currentDeviceIndex].deviceId } } }; }

        try {
            currentStream = await navigator.mediaDevices.getUserMedia(constraints);
            let video = document.getElementById('videoElement');
            video.srcObject = currentStream;
            video.style.display = 'block';
            
            document.getElementById('btnTriggerLive').style.display = 'block';
            if(videoDevices.length > 1) document.getElementById('btnSwitchLens').style.display = 'inline-block';
        } catch (error) {
            alert("Camera not found or blocked. Switch to Mobile mode.");
        }
    }

    function switchLiveCamera() {
        if (videoDevices.length > 1) {
            currentDeviceIndex = (currentDeviceIndex + 1) % videoDevices.length;
            startLiveStream();
        }
    }

    function captureLiveFrame() {
        if (!currentStream) return;
        const video = document.getElementById('videoElement');
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        showPreviewAndSend(canvas.toDataURL('image/jpeg', 0.90));
    }

    // =====================================
    // COMMON LOGIC
    // =====================================
    function showPreviewAndSend(base64Data) {
        document.getElementById('previewImage').src = base64Data;
        document.getElementById('previewImage').style.display = 'block';
        document.getElementById('videoElement').style.display = 'none';
        document.getElementById('placeholderBox').style.display = 'none';
        
        document.getElementById('captureControls').style.display = 'none';
        document.getElementById('actionControls').style.display = 'flex';
        
        if (conn && conn.open) {
            let item = tagsList[currentIndex];
            // Job ID, Req ID, Tag ID sab ek sath send ho raha hai
            conn.send({ type: 'PHOTO_UPLOAD', reqId: item.reqId, jobId: item.jobId, tagId: item.tagId, photoType: currentPhotoMode, image: base64Data });
        }
    }

    function triggerRetake() {
        resetUI();
        if(engineMode === 'native') document.getElementById('nativeCameraInput').click();
        else startLiveStream();
    }
    
    function nextTag() { currentIndex++; updateUIForCurrentTag(); }
    
    function showScreen(id) {
        document.querySelectorAll('#connectScreen, #modeScreen, #cameraScreen').forEach(el => el.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        if(id !== 'cameraScreen' && currentStream) { currentStream.getTracks().forEach(t => t.stop()); currentStream = null; }
    }
    
    function goBackToMode() { showScreen('modeScreen'); }
    function disconnect() { if(peer) peer.destroy(); location.reload(); }

    // Service Worker for PWA
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./service-worker.js').catch(err => console.log(err));
    }
</script>
</body>
</html>
